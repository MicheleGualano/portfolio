<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D40000"/>
      <stop offset="100%" stop-color="#A60000"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#FFFFFF" stroke-width="0.5" stroke-opacity="0.07"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>

  <!-- Industrial gear motif top-right -->
  <g transform="translate(1320,220)" opacity="0.18">
    <circle cx="0" cy="0" r="140" fill="none" stroke="#FFFFFF" stroke-width="3"/>
    <circle cx="0" cy="0" r="92" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <circle cx="0" cy="0" r="36" fill="#FFFFFF" fill-opacity="0.4"/>
    <g stroke="#FFFFFF" stroke-width="3">
      <line x1="0" y1="-160" x2="0" y2="-130"/><line x1="0" y1="160" x2="0" y2="130"/>
      <line x1="-160" y1="0" x2="-130" y2="0"/><line x1="160" y1="0" x2="130" y2="0"/>
      <line x1="-113" y1="-113" x2="-92" y2="-92"/><line x1="113" y1="113" x2="92" y2="92"/>
      <line x1="-113" y1="113" x2="-92" y2="92"/><line x1="113" y1="-113" x2="92" y2="-92"/>
    </g>
  </g>

  <!-- TEKNA wordmark — official brand: white on red, with red triangle accent -->
  <g transform="translate(160,340)">
    <!-- Wordmark text -->
    <text x="0" y="120" fill="#FFFFFF" font-family="'Inter', system-ui, sans-serif" font-weight="900" font-size="180" letter-spacing="-4">TEKNA</text>
    <!-- Underline accent in white -->
    <rect x="0" y="160" width="320" height="6" fill="#FFFFFF"/>
  </g>

  <!-- Sublabel: Automazione & Controllo -->
  <text x="160" y="560" fill="#FFFFFF" font-family="'Inter', system-ui, sans-serif" font-weight="500" font-size="36" letter-spacing="-1" opacity="0.95">Automazione &amp; Controllo</text>
  <text x="160" y="610" fill="#FFFFFF" font-family="'Inter', system-ui, sans-serif" font-weight="400" font-size="22" opacity="0.75">Industrial automation · since 1994</text>

  <!-- Top meta -->
  <text x="160" y="160" fill="#FFFFFF" font-family="'JetBrains Mono', monospace" font-size="18" letter-spacing="6" opacity="0.8">IMPACT FOR PUGLIA  ·  AI ORCHESTRATION</text>

  <!-- Bottom meta -->
  <text x="160" y="800" fill="#FFFFFF" font-family="'JetBrains Mono', monospace" font-size="16" letter-spacing="4" opacity="0.8">n8n CONTENT AGENT  ·  LANDING + CHATBOT  ·  SHIPPED TO PRODUCTION</text>
</svg>
