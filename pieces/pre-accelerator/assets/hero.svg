<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B3A2F"/>
      <stop offset="60%" stop-color="#2A5640"/>
      <stop offset="100%" stop-color="#3D7A56"/>
    </linearGradient>
    <pattern id="ivy" x="0" y="0" width="64" height="64" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="2.5" fill="#5FAA75" fill-opacity="0.25"/>
      <circle cx="48" cy="48" r="2" fill="#5FAA75" fill-opacity="0.18"/>
      <circle cx="36" cy="8" r="1.5" fill="#5FAA75" fill-opacity="0.20"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#ivy)"/>

  <!-- abstract STARTUP wall (mimicking the H-FARM Startup Center ivy wall in the PDF cover) -->
  <g transform="translate(80,540)" opacity="0.16">
    <rect x="0" y="0" width="240" height="240" rx="6" fill="#5FAA75"/>
  </g>

  <!-- top meta -->
  <text x="120" y="160" fill="#A8D4B0" font-family="JetBrains Mono, monospace" font-size="18" letter-spacing="6">H-FARM STARTUP CENTER  ·  FALL EDITION 2025</text>

  <!-- main title -->
  <text x="120" y="460" fill="#F8F4E8" font-family="Cormorant Garamond, Georgia, serif" font-weight="500" font-size="180" letter-spacing="-4">Pre-Accelerator</text>
  <text x="124" y="540" fill="#A8D4B0" font-family="Cormorant Garamond, Georgia, serif" font-style="italic" font-size="44">Young minds, big startups ideas.</text>

  <!-- subline -->
  <text x="120" y="610" fill="#E8E0CC" font-family="Inter, sans-serif" font-size="22" letter-spacing="0.5">MARA was 1 of 6 selected — the cohort that became real</text>

  <!-- bottom meta -->
  <text x="120" y="820" fill="#A8D4B0" font-family="JetBrains Mono, monospace" font-size="16" letter-spacing="4">ETERNA  ·  MARA  ·  WEALTURA  ·  PROFIVE  ·  FWDRI  ·  FARMATERM  ·  RETAP</text>

  <!-- decorative leaf cluster top-right -->
  <g transform="translate(1340,200)" opacity="0.6">
    <circle cx="0" cy="0" r="80" fill="none" stroke="#A8D4B0" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="48" fill="#5FAA75" fill-opacity="0.3"/>
  </g>
</svg>
