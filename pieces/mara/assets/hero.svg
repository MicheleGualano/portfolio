<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="g" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#273C75" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#1A2A57" stop-opacity="1"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="38" height="38" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#4A7BF7" fill-opacity="0.16"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="#1A2A57"/>
  <rect width="1600" height="900" fill="url(#g)"/>
  <rect width="1600" height="900" fill="url(#dots)"/>

  <!-- MARA star/brand mark, top-left -->
  <g transform="translate(140,160)">
    <path d="M0 -42 L12 -12 L42 0 L12 12 L0 42 L-12 12 L-42 0 L-12 -12 Z" fill="#4A7BF7" opacity="0.95"/>
  </g>

  <!-- wordmark -->
  <text x="140" y="510" fill="#FAFBFF" font-family="Cormorant Garamond, Times New Roman, serif" font-weight="500" font-size="240" letter-spacing="-8">mara</text>
  <text x="146" y="572" fill="#4A7BF7" font-family="Inter, sans-serif" font-weight="500" font-size="26" letter-spacing="6">B2EDUCATION  ·  PROOF OF WORK  ·  marachallenge.com</text>

  <!-- meta line bottom -->
  <text x="140" y="800" fill="#a8b0d0" font-family="DM Mono, JetBrains Mono, monospace" font-size="18" letter-spacing="3">NEXT.JS  ·  SUPABASE  ·  CLAUDE  ·  POLYGON SBT  ·  LIVE</text>

  <!-- triangle motif right -->
  <g transform="translate(1320,450)" opacity="0.85">
    <circle cx="0" cy="0" r="180" fill="none" stroke="#4A7BF7" stroke-width="2"/>
    <circle cx="0" cy="0" r="110" fill="none" stroke="#C8A96E" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="44" fill="#4A7BF7" fill-opacity="0.5"/>
  </g>
</svg>
