<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="redGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF1818"/>
      <stop offset="100%" stop-color="#D60010"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#FFFFFF" fill-opacity="0.06"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#redGrad)"/>
  <rect width="1600" height="900" fill="url(#dots)"/>

  <!-- Stylized tractor mark (H-FARM signature shape), top-center small -->
  <g transform="translate(800,140)" fill="#FFFFFF">
    <rect x="-26" y="-14" width="52" height="22" rx="3"/>
    <rect x="-32" y="-2" width="64" height="10" rx="2"/>
    <circle cx="-18" cy="14" r="8"/>
    <circle cx="-18" cy="14" r="3" fill="#FF1818"/>
    <circle cx="22" cy="14" r="11"/>
    <circle cx="22" cy="14" r="4" fill="#FF1818"/>
    <rect x="-22" y="-20" width="6" height="6" rx="1"/>
  </g>
  <text x="800" y="200" text-anchor="middle" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="18" letter-spacing="2">H-FARM COLLEGE</text>

  <!-- Main wordmark -->
  <text x="800" y="490" text-anchor="middle" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="160" letter-spacing="-2">PRE-ACCELERATOR</text>

  <!-- Handwritten 'Fall Edition' in yellow -->
  <text x="800" y="610" text-anchor="middle" fill="#FFC940" font-family="'Brush Script MT', cursive" font-style="italic" font-size="120" font-weight="500">Fall Edition</text>

  <!-- Bottom: ESC mark + cohort hint -->
  <g transform="translate(800,760)" fill="#FFFFFF">
    <rect x="-32" y="-14" width="64" height="20" rx="3" fill="none"/>
  </g>
  <text x="800" y="790" text-anchor="middle" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="16" letter-spacing="3">ENTREPRENEURSHIP &amp; STARTUP CENTER</text>
  <text x="800" y="830" text-anchor="middle" fill="#FFC940" font-family="'Brush Script MT', cursive" font-style="italic" font-size="22">2025 cohort  ·  6 selected teams  ·  MARA</text>
</svg>
